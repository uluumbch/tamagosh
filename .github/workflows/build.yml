name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed by the release job to upload assets

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: arm64 } # Apple Silicon
          - { goos: darwin, goarch: amd64 } # Intel Mac
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/tamagosh-${GOOS}-${GOARCH} .
      - uses: actions/upload-artifact@v5
        with:
          name: tamagosh-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  # Runs only when a v* tag is pushed: packages the binaries as .tar.gz
  # (preserves the executable bit, which raw artifact zips do not) and
  # attaches them to a GitHub Release with checksums — the same layout a
  # Homebrew formula will later point at.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Package
        run: |
          cd dist
          for bin in tamagosh-*; do
            chmod +x "$bin"
            tar -czf "${bin}.tar.gz" --transform="s|$bin|tamagosh|" "$bin"
            rm "$bin"
          done
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
